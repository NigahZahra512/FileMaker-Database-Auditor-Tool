# DAY 5: docker-compose.yml
# --------------------------------------------------------------------
# One command to run the whole tool: docker compose up
# No manual pip install, no manual "python main.py" -- Docker builds
# the image from the Dockerfile and starts it automatically.

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      # required: false means `docker compose up` no longer fails if
      # you haven't created a .env file yet -- you can also just paste
      # your API key into the app's Settings panel in the browser
      # (stored in server memory only) instead of using a .env file at all.
      - path: .env
        required: false
    volumes:
      # PERSISTENCE FIX: database.py's _db_path() resolves to
      # backend/auditor.db when NOT running as a frozen .exe (the
      # Docker case) -- confirmed by reading database.py directly.
      # Without this, every `docker compose up --build` wipes
      # auditor.db, along with every saved client/snapshot and
      # everything Compare/Timeline/Dashboard/Table Audit/Script
      # Audit are built on top of. This bind-mounts that exact file
      # onto ./data/auditor.db on your own computer, created
      # automatically on first run.
      - ./data/auditor.db:/app/backend/auditor.db
    restart: unless-stopped
